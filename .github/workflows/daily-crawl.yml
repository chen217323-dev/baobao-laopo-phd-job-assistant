name: Daily job crawl

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Crawl latest jobs
        run: node work/crawler/crawl-jobs.mjs

      - name: Commit updated job data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/jobs.json outputs/jobs-data.js outputs/app/jobs.json outputs/app/jobs-data.js
          git diff --cached --quiet || git commit -m "chore: update daily job data"
          git push
